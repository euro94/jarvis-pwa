<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="theme-color" content="#0A0A0A">
<title>JARVIS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
  :root {
    --bg:#0A0A0A; --fg:#FFFFFF; --cyan:#00E5FF; --dim:#8a8f93;
    --card:#141414; --line:#1f1f1f; --user:#063b44; --safe-b: env(safe-area-inset-bottom);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; }
  body {
    background:radial-gradient(1200px 600px at 50% -10%, #06222a 0%, var(--bg) 55%) fixed;
    color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; height:100dvh;
  }
  /* top bar */
  .top { display:flex; align-items:center; gap:11px; padding:calc(env(safe-area-inset-top) + 14px) 20px 12px; }
  .top img { width:38px; height:38px; border-radius:10px; box-shadow:0 0 16px rgba(0,229,255,.35); }
  .top .name { font-weight:800; letter-spacing:3px; font-size:17px; }
  .top .name span { color:var(--cyan); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); margin-left:auto; transition:.3s; }
  .dot.live { background:var(--cyan); box-shadow:0 0 10px var(--cyan); }

  /* screens */
  .screen { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:4px 20px 0; display:none; }
  .screen.active { display:block; }
  #screenChat.active { display:flex; flex-direction:column; padding:0; }

  /* cards */
  .hero { text-align:center; margin:18px 0 6px; }
  .hero .greeting { color:var(--dim); font-size:14px; }
  .hero .headline { font-size:24px; font-weight:700; margin-top:5px; line-height:1.25; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin-top:14px; }
  .card h3 { margin:0 0 12px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--cyan); font-weight:700; }
  .row { display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--line); }
  .row:last-child { border-bottom:none; }
  .row .k { color:var(--dim); font-size:14px; } .row .v { font-weight:600; font-size:15px; text-align:right; max-width:62%; }
  .big { font-size:32px; font-weight:800; text-align:center; } .big small { font-size:13px; color:var(--dim); font-weight:500; letter-spacing:1px; }
  .btn { width:100%; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; margin-top:11px; transition:transform .08s,opacity .2s; }
  .btn:active { transform:scale(.985); } .btn:disabled { opacity:.45; }
  .btn-primary { background:var(--cyan); color:#00161a; box-shadow:0 8px 30px rgba(0,229,255,.25); }
  .btn-ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
  .note { color:var(--dim); font-size:12.5px; text-align:center; margin-top:12px; line-height:1.5; }

  /* chat */
  #chatThread { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 16px 8px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:82%; padding:11px 14px; border-radius:18px; font-size:15.5px; line-height:1.42; white-space:pre-wrap; word-wrap:break-word; animation:pop .18s ease-out; }
  @keyframes pop { from{opacity:0; transform:translateY(6px) scale(.98);} to{opacity:1; transform:none;} }
  .msg.me { align-self:flex-end; background:var(--user); border:1px solid #0a525e; border-bottom-right-radius:6px; }
  .msg.ai { align-self:flex-start; background:var(--card); border:1px solid var(--line); border-bottom-left-radius:6px; }
  .msg.ai b { color:var(--cyan); }
  .typing { align-self:flex-start; display:flex; gap:5px; padding:14px 16px; background:var(--card); border:1px solid var(--line); border-radius:18px; border-bottom-left-radius:6px; }
  .typing span { width:7px; height:7px; border-radius:50%; background:var(--cyan); opacity:.5; animation:blink 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink { 0%,60%,100%{opacity:.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);} }
  .composer { display:flex; align-items:flex-end; gap:9px; padding:10px 14px calc(var(--safe-b) + 10px); border-top:1px solid var(--line); background:rgba(10,10,10,.85); backdrop-filter:blur(10px); }
  .composer textarea { flex:1; resize:none; max-height:120px; background:#0c0c0c; color:var(--fg); border:1px solid var(--line); border-radius:20px; padding:11px 15px; font-size:16px; font-family:inherit; line-height:1.3; }
  .iconbtn { width:46px; height:46px; flex:0 0 46px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; transition:transform .08s; }
  .iconbtn:active { transform:scale(.9); }
  .mic { background:var(--card); border:1px solid var(--line); color:var(--cyan); }
  .mic.listening { background:var(--cyan); color:#00161a; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,.5);} 50%{box-shadow:0 0 0 12px rgba(0,229,255,0);} }
  .send { background:var(--cyan); color:#00161a; }

  /* bottom nav */
  .nav { display:flex; border-top:1px solid var(--line); background:rgba(10,10,10,.9); backdrop-filter:blur(10px); padding-bottom:var(--safe-b); }
  .nav button { flex:1; background:none; border:none; color:var(--dim); padding:11px 0 9px; font-size:10.5px; font-weight:600; letter-spacing:.5px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .nav button .ico { font-size:21px; line-height:1; }
  .nav button.active { color:var(--cyan); }
  #screenChat.active ~ .nav { } /* nav always visible */

  .toast { position:fixed; left:20px; right:20px; bottom:calc(var(--safe-b) + 70px); background:#16302f; border:1px solid #1f5b58; color:#c9fff9; padding:13px 16px; border-radius:12px; text-align:center; font-size:14px; opacity:0; transform:translateY(10px); transition:.3s; pointer-events:none; z-index:60; }
  .toast.show { opacity:1; transform:translateY(0); } .toast.err { background:#311616; border-color:#5b1f1f; color:#ffd2d2; }
  textarea.subbox { width:100%; height:110px; margin-top:11px; background:#0c0c0c; color:var(--cyan); border:1px solid var(--line); border-radius:12px; padding:11px; font-size:11px; font-family:ui-monospace,monospace; display:none; }
  .foot { text-align:center; color:#3a3f43; font-size:11px; letter-spacing:2px; margin:18px 0 8px; }

  /* log sheet */
  #logSheet { display:none; position:fixed; inset:0; background:rgba(5,5,5,.93); backdrop-filter:blur(8px); z-index:100; padding:calc(env(safe-area-inset-top) + 20px) 22px calc(var(--safe-b) + 24px); flex-direction:column; justify-content:center; }
  #logSheet .lbl { text-align:center; color:var(--cyan); letter-spacing:3px; font-size:12px; font-weight:700; margin-bottom:6px; }
  #logSheet .ttl { text-align:center; font-size:24px; font-weight:700; margin-bottom:24px; }
</style>
</head>
<body>
  <div class="top">
    <img src="icons/icon-192.png" alt="JARVIS">
    <div class="name">J<span>.</span>A<span>.</span>R<span>.</span>V<span>.</span>I<span>.</span>S</div>
    <div class="dot" id="dot"></div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="screenHome">
    <div class="hero">
      <div class="greeting" id="greeting">Standing by</div>
      <div class="headline" id="headline">Your intelligence system</div>
    </div>
    <div class="card">
      <h3>Today</h3>
      <div class="row"><span class="k">Next</span><span class="v" id="next">—</span></div>
      <div class="row"><span class="k">Leave by</span><span class="v" id="leaveby">—</span></div>
      <div class="row"><span class="k">Weather</span><span class="v" id="weather">—</span></div>
      <div class="row"><span class="k">Focus</span><span class="v" id="focus">—</span></div>
    </div>
    <div class="card"><h3>Gym Streak</h3><div class="big" id="streak">0 <small>DAYS</small></div></div>
    <button class="btn btn-ghost" id="refreshBtn">↻ Refresh status</button>
    <div class="foot">NOUS · HERMES</div>
  </div>

  <!-- CHAT -->
  <div class="screen" id="screenChat">
    <div id="chatThread"></div>
    <div class="composer">
      <button class="iconbtn mic" id="micBtn" title="Speak">🎙️</button>
      <textarea id="chatInput" rows="1" placeholder="Ask JARVIS…"></textarea>
      <button class="iconbtn send" id="sendBtn" title="Send">↑</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="screenSettings">
    <div class="card">
      <h3>Notifications</h3>
      <div class="note" id="pushStatus" style="margin-top:0;">Push not enabled yet.</div>
      <button class="btn btn-primary" id="enableBtn">Enable JARVIS Push</button>
      <button class="btn btn-ghost" id="testBtn" style="display:none;">Send me a test push</button>
      <textarea class="subbox" id="subText" readonly></textarea>
      <button class="btn btn-ghost" id="copyBtn" style="display:none;">Copy subscription</button>
    </div>
    <div class="card">
      <h3>Voice</h3>
      <div class="row"><span class="k">Read replies aloud</span><span class="v"><input type="checkbox" id="ttsToggle" style="transform:scale(1.4);"></span></div>
      <div class="note" style="text-align:left;">When on, JARVIS speaks its answers in the Talk tab.</div>
    </div>
    <div class="card">
      <h3>Chat</h3>
      <button class="btn btn-ghost" id="clearChat">Clear conversation</button>
    </div>
    <div class="foot">NOUS · HERMES · JARVIS</div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="active" data-screen="screenHome"><span class="ico">◎</span>HOME</button>
    <button data-screen="screenChat"><span class="ico">⌬</span>TALK</button>
    <button data-screen="screenSettings"><span class="ico">⚙</span>SETTINGS</button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- LOG SHEET -->
  <div id="logSheet">
    <div class="lbl">J.A.R.V.I.S. CHECK-IN</div>
    <div class="ttl" id="logTitle">Log Gym</div>
    <button class="btn btn-primary" data-status="done">✅ Did it</button>
    <button class="btn btn-ghost" data-status="partial" style="border-color:#5b4a1f;color:#ffd98a;">🟡 Partial</button>
    <button class="btn btn-ghost" data-status="skipped" style="border-color:#5b1f1f;color:#ffb0b0;">❌ Skipped</button>
    <button class="btn btn-ghost" id="logClose" style="margin-top:18px;opacity:.6;">Dismiss</button>
  </div>

<script>
/* ===== CONFIG ===== */
const VAPID_PUBLIC = "BJDnPKy5bxemFNASfGNRCprskjmhnon32m3ksEypcK7RzcT5_6g3mbSEu_Ad-7vQX891PbnSwCDI7Vjl_4icBak";
const SUB_TOPIC    = "hermes-yaro-jarvis-pwa-sub-426e9ec3";
const STATE_TOPIC  = "hermes-yaro-jarvis-state-85ec36fe";
const INBOUND_TOPIC= "hermes-yaro-jarvis-in-c4e3ac0f";   // -> gateway -> Jarvis
const REPLY_TOPIC  = "hermes-yaro-jarvis-7450b76f";       // Jarvis publishes replies here
const NTFY = "https://ntfy.sh";

const $ = (id) => document.getElementById(id);
const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
function toast(m, err){ const t=$('toast'); t.textContent=m; t.className='toast show'+(err?' err':''); setTimeout(()=>t.className='toast',3200); }
function haptic(){ try{ navigator.vibrate && navigator.vibrate(8); }catch(e){} }
function urlB64ToUint8(b64){ const pad='='.repeat((4-b64.length%4)%4); const b=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); const r=atob(b); const a=new Uint8Array(r.length); for(let i=0;i<r.length;i++)a[i]=r.charCodeAt(i); return a; }

/* ===== NAV ===== */
document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    b.classList.add('active'); $(b.dataset.screen).classList.add('active');
    haptic();
    if(b.dataset.screen==='screenChat'){ scrollChat(); $('chatInput').focus(); }
  });
});

/* ===== GREETING ===== */
(function(){ const h=new Date().getHours(); $('greeting').textContent = h<12?'Good morning, Yaro':h<18?'Good afternoon, Yaro':'Good evening, Yaro'; })();

/* ===== STATE FEED ===== */
async function loadState(){
  try{
    const r=await fetch(`${NTFY}/${STATE_TOPIC}/json?poll=1`,{cache:'no-store'});
    const lines=(await r.text()).trim().split('\n').filter(Boolean);
    let latest=null;
    for(const ln of lines){ try{ const o=JSON.parse(ln); if(o.event==='message'&&o.message) latest=o.message; }catch(e){} }
    if(!latest) return;
    const s=JSON.parse(latest);
    if(s.headline)$('headline').textContent=s.headline;
    if(s.next)$('next').textContent=s.next;
    if(s.leaveby)$('leaveby').textContent=s.leaveby;
    if(s.weather)$('weather').textContent=s.weather;
    if(s.focus)$('focus').textContent=s.focus;
    if(s.streak!=null)$('streak').innerHTML=`${s.streak} <small>DAYS</small>`;
    $('dot').classList.add('live');
  }catch(e){}
}
loadState(); setInterval(loadState, 60000);
$('refreshBtn').addEventListener('click', ()=>{ loadState(); haptic(); toast('Refreshed.'); });

/* ===== CHAT ===== */
let chatLog = JSON.parse(localStorage.getItem('jarvisChat')||'[]');
let polling=false, pollStop=0;

function renderChat(){
  const t=$('chatThread'); t.innerHTML='';
  if(chatLog.length===0){
    const w=document.createElement('div'); w.className='msg ai';
    w.innerHTML='<b>JARVIS online.</b> Ask me anything — your schedule, a quick calc, add a calendar event, or just talk. I have your calendar, memory, and tools.';
    t.appendChild(w);
  }
  for(const m of chatLog){ const d=document.createElement('div'); d.className='msg '+(m.role==='me'?'me':'ai'); d.textContent=m.text; t.appendChild(d); }
  scrollChat();
}
function scrollChat(){ const t=$('chatThread'); requestAnimationFrame(()=>{ t.scrollTop=t.scrollHeight; }); }
function pushMsg(role,text){ chatLog.push({role,text,t:Date.now()}); if(chatLog.length>100)chatLog=chatLog.slice(-100); localStorage.setItem('jarvisChat',JSON.stringify(chatLog)); renderChat(); }
function showTyping(){ if($('typingRow'))return; const d=document.createElement('div'); d.className='typing'; d.id='typingRow'; d.innerHTML='<span></span><span></span><span></span>'; $('chatThread').appendChild(d); scrollChat(); }
function hideTyping(){ const e=$('typingRow'); if(e)e.remove(); }

async function askJarvis(text, silent){
  if(!silent){ pushMsg('me',text); }
  showTyping();
  const sentAt = Math.floor(Date.now()/1000) - 1;
  try{
    await fetch(`${NTFY}/${INBOUND_TOPIC}`, { method:'POST', body:text });
  }catch(e){ hideTyping(); toast('Could not reach JARVIS.',true); return; }
  pollReply(sentAt, silent);
}

async function pollReply(sinceTs, silent){
  pollStop = Date.now()+120000; // poll up to 2 min
  const seen=new Set();
  // noise patterns that land on the shared reply topic but aren't chat answers
  const isNoise = (m)=>{
    const t=m.trim();
    return !t
      || /top-up left/i.test(t)
      || /^💾/.test(t)
      || /Self-improvement review/i.test(t)
      || /Memory updated/i.test(t)
      || /^•\s/.test(t);
  };
  while(Date.now()<pollStop){
    try{
      const r=await fetch(`${NTFY}/${REPLY_TOPIC}/json?poll=1&since=${sinceTs}`,{cache:'no-store'});
      const lines=(await r.text()).trim().split('\n').filter(Boolean);
      for(const ln of lines){
        let o; try{o=JSON.parse(ln);}catch(e){continue;}
        if(o.event!=='message'||!o.id||seen.has(o.id))continue;
        seen.add(o.id);
        if(o.time && o.time < sinceTs) continue;
        const msg=(o.message||'').trim();
        if(isNoise(msg)) continue;
        hideTyping();
        pushMsg('ai', msg);
        speak(msg);
        return; // got the reply
      }
    }catch(e){}
    await new Promise(r=>setTimeout(r,2500));
  }
  hideTyping();
  if(!silent) toast('No reply yet — JARVIS may be busy.',true);
}

$('sendBtn').addEventListener('click', sendFromInput);
$('chatInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendFromInput(); } });
$('chatInput').addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });
function sendFromInput(){ const v=$('chatInput').value.trim(); if(!v)return; $('chatInput').value=''; $('chatInput').style.height='auto'; haptic(); askJarvis(v,false); }
$('clearChat').addEventListener('click', ()=>{ chatLog=[]; localStorage.removeItem('jarvisChat'); renderChat(); toast('Conversation cleared.'); });
renderChat();

/* ===== VOICE INPUT (Web Speech API) ===== */
let recog=null, listening=false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=false;
  recog.onresult=(e)=>{ let txt=''; for(let i=0;i<e.results.length;i++)txt+=e.results[i][0].transcript; $('chatInput').value=txt; };
  recog.onend=()=>{ listening=false; $('micBtn').classList.remove('listening'); const v=$('chatInput').value.trim(); if(v){ $('chatInput').value=''; askJarvis(v,false); } };
  recog.onerror=()=>{ listening=false; $('micBtn').classList.remove('listening'); };
}
$('micBtn').addEventListener('click', ()=>{
  if(!SR){ toast('Voice input not supported here — type instead.',true); return; }
  if(listening){ recog.stop(); return; }
  haptic(); listening=true; $('micBtn').classList.add('listening'); $('chatInput').value=''; try{recog.start();}catch(e){}
});

/* ===== TTS PLAYBACK ===== */
$('ttsToggle').checked = localStorage.getItem('jarvisTTS')==='1';
$('ttsToggle').addEventListener('change', function(){ localStorage.setItem('jarvisTTS', this.checked?'1':'0'); if(this.checked) speak('Voice enabled.'); });
function speak(text){
  if(localStorage.getItem('jarvisTTS')!=='1' || !window.speechSynthesis) return;
  const clean=text.replace(/[*_`#>]/g,'').slice(0,500);
  const u=new SpeechSynthesisUtterance(clean); u.rate=1.04; u.pitch=1; u.lang='en-US';
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}

/* ===== PUSH ===== */
async function registerSW(){ if(!('serviceWorker' in navigator)) throw new Error('No SW'); return navigator.serviceWorker.register('sw.js'); }
async function enablePush(){
  if(!isStandalone()){ toast('First: Share → Add to Home Screen, then open JARVIS from the icon.',true); return; }
  if(!('PushManager' in window)){ toast('Push not supported here.',true); return; }
  $('enableBtn').disabled=true; $('enableBtn').textContent='Enabling…';
  try{
    const reg=await registerSW(); await navigator.serviceWorker.ready;
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ toast('Permission denied.',true); resetBtn(); return; }
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC) });
    const j=JSON.stringify(sub); let delivered=false;
    try{ const resp=await fetch(`${NTFY}/${SUB_TOPIC}`,{method:'POST',headers:{'Title':'jarvis-subscription'},body:j}); delivered=resp.ok; }catch(e){}
    $('subText').value=j;
    if(!delivered){ $('subText').style.display='block'; $('copyBtn').style.display='block'; toast('Subscribed. Tap Copy and send to Jarvis.'); }
    localStorage.setItem('jarvisSub','1'); localStorage.setItem('jarvisSubJson',j);
    $('pushStatus').textContent='Push enabled. JARVIS can reach you.'; $('enableBtn').textContent='Push Enabled ✓'; $('testBtn').style.display='block'; $('dot').classList.add('live');
    toast('JARVIS is online.');
  }catch(e){ toast('Failed: '+e.message,true); resetBtn(); }
}
function resetBtn(){ $('enableBtn').disabled=false; $('enableBtn').textContent='Enable JARVIS Push'; }
async function sendTest(){ await fetch(`${NTFY}/${SUB_TOPIC}`,{method:'POST',headers:{'Title':'jarvis-test-request'},body:'TEST_PUSH'}); toast('Requested — should land shortly.'); }
$('enableBtn').addEventListener('click',enablePush);
$('testBtn').addEventListener('click',sendTest);
$('copyBtn').addEventListener('click',async()=>{ const v=$('subText').value||localStorage.getItem('jarvisSubJson')||''; try{await navigator.clipboard.writeText(v); toast('Copied.');}catch(e){$('subText').style.display='block';$('subText').select();toast('Select all & copy.',true);} });

if(localStorage.getItem('jarvisSub')){
  registerSW();
  $('pushStatus').textContent='Push enabled. JARVIS can reach you.'; $('enableBtn').textContent='Push Enabled ✓'; $('testBtn').style.display='block';
  (async()=>{ try{ const reg=await navigator.serviceWorker.ready; const sub=await reg.pushManager.getSubscription(); if(sub){ const j=JSON.stringify(sub); if(j!==localStorage.getItem('jarvisSubJson')){ localStorage.setItem('jarvisSubJson',j); fetch(`${NTFY}/${SUB_TOPIC}`,{method:'POST',headers:{'Title':'jarvis-subscription'},body:j}).catch(()=>{}); } } }catch(e){} })();
}
if(!isStandalone()){ $('pushStatus').innerHTML='To enable push: tap <b>Share</b> → <b>Add to Home Screen</b>, then open JARVIS from the icon.'; }

/* ===== LOG SHEET ===== */
function showLogSheet(habit){ $('logTitle').textContent='Log '+habit; const s=$('logSheet'); s.style.display='flex'; s.dataset.habit=habit; }
async function logStatus(habit,status){ try{ await fetch(`${NTFY}/${INBOUND_TOPIC}`,{method:'POST',body:`Log ${habit}: ${status}`}); toast(`Logged: ${habit} ${status} ✓`); haptic(); }catch(e){ toast('Could not reach Jarvis.',true); } setTimeout(()=>{$('logSheet').style.display='none';},900); }
document.querySelectorAll('#logSheet [data-status]').forEach(b=>b.addEventListener('click',()=>logStatus($('logSheet').dataset.habit||'Gym',b.dataset.status)));
$('logClose').addEventListener('click',()=>{$('logSheet').style.display='none';});
(function(){ const h=new URLSearchParams(location.search).get('log'); if(h){ showLogSheet(h); history.replaceState({},'',location.pathname); } })();
navigator.serviceWorker && navigator.serviceWorker.addEventListener('message',(e)=>{ if(e.data&&e.data.type==='show-log'&&e.data.habit) showLogSheet(e.data.habit); });
</script>
</body>
</html>
