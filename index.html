<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="theme-color" content="#0A0A0A">
<title>JARVIS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
  :root {
    --bg: #0A0A0A; --fg: #FFFFFF; --cyan: #00E5FF;
    --dim: #8a8f93; --card: #141414; --line: #1f1f1f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #06222a 0%, var(--bg) 55%) fixed;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 24px);
    display: flex; flex-direction: column; min-height: 100%;
  }
  .top { display: flex; align-items: center; gap: 12px; padding: 22px 0 8px; }
  .top img { width: 44px; height: 44px; border-radius: 11px;
    box-shadow: 0 0 18px rgba(0,229,255,0.35); }
  .top .name { font-weight: 800; letter-spacing: 4px; font-size: 20px; }
  .top .name span { color: var(--cyan); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim);
    margin-left: auto; box-shadow: 0 0 8px transparent; transition: .3s; }
  .status-dot.live { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

  .hero { text-align: center; margin: 28px 0 8px; }
  .hero .greeting { color: var(--dim); font-size: 14px; letter-spacing: .5px; }
  .hero .headline { font-size: 26px; font-weight: 700; margin-top: 6px; line-height: 1.25; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 18px; margin-top: 14px; }
  .card h3 { margin: 0 0 12px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--cyan); font-weight: 700; }
  .row { display: flex; justify-content: space-between; align-items: baseline;
    padding: 9px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .row .k { color: var(--dim); font-size: 14px; }
  .row .v { font-weight: 600; font-size: 15px; text-align: right; }
  .big { font-size: 34px; font-weight: 800; }
  .big small { font-size: 14px; color: var(--dim); font-weight: 500; letter-spacing: 1px; }

  .btn { width: 100%; border: none; border-radius: 14px; padding: 17px; font-size: 16px;
    font-weight: 700; letter-spacing: .3px; cursor: pointer; margin-top: 12px;
    transition: transform .08s, opacity .2s; }
  .btn:active { transform: scale(.985); }
  .btn-primary { background: var(--cyan); color: #00161a; box-shadow: 0 8px 30px rgba(0,229,255,.25); }
  .btn-ghost { background: transparent; color: var(--fg); border: 1px solid var(--line); }
  .btn:disabled { opacity: .45; cursor: default; }

  .note { color: var(--dim); font-size: 12.5px; text-align: center; margin-top: 14px; line-height: 1.5; }
  .toast { position: fixed; left: 20px; right: 20px; bottom: calc(env(safe-area-inset-bottom) + 18px);
    background: #16302f; border: 1px solid #1f5b58; color: #c9fff9; padding: 14px 16px;
    border-radius: 12px; text-align: center; font-size: 14px; opacity: 0; transform: translateY(10px);
    transition: .3s; pointer-events: none; z-index: 50; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { background: #311616; border-color: #5b1f1f; color: #ffd2d2; }
  .spacer { flex: 1; }
  .foot { text-align: center; color: #3a3f43; font-size: 11px; letter-spacing: 2px; margin-top: 18px; }
  .install-hint { display: none; }
</style>
</head>
<body>
  <div class="top">
    <img src="icons/icon-192.png" alt="JARVIS">
    <div class="name">J<span>.</span>A<span>.</span>R<span>.</span>V<span>.</span>I<span>.</span>S</div>
    <div class="status-dot" id="dot"></div>
  </div>

  <div class="hero">
    <div class="greeting" id="greeting">Standing by</div>
    <div class="headline" id="headline">Your intelligence system</div>
  </div>

  <div class="card">
    <h3>Today</h3>
    <div class="row"><span class="k">Next</span><span class="v" id="next">—</span></div>
    <div class="row"><span class="k">Leave by</span><span class="v" id="leaveby">—</span></div>
    <div class="row"><span class="k">Focus</span><span class="v" id="focus">—</span></div>
  </div>

  <div class="card" style="text-align:center;">
    <h3>Gym Streak</h3>
    <div class="big" id="streak">0 <small>DAYS</small></div>
  </div>

  <div class="card">
    <h3>Notifications</h3>
    <div class="note" id="pushStatus" style="margin-top:0;">Push not enabled yet.</div>
    <button class="btn btn-primary" id="enableBtn">Enable JARVIS Push</button>
    <button class="btn btn-ghost" id="testBtn" style="display:none;">Send me a test push</button>
    <textarea id="subText" readonly style="display:none;width:100%;height:120px;margin-top:12px;background:#0c0c0c;color:#00E5FF;border:1px solid #1f1f1f;border-radius:12px;padding:12px;font-size:11px;font-family:ui-monospace,monospace;"></textarea>
    <button class="btn btn-ghost" id="copyBtn" style="display:none;">Copy subscription (send to Jarvis)</button>
  </div>

  <div class="spacer"></div>
  <div class="foot">NOUS · HERMES</div>
  <div class="toast" id="toast"></div>

  <!-- One-tap log overlay (opened from a check-in notification tap) -->
  <div id="logSheet" style="display:none;position:fixed;inset:0;background:rgba(5,5,5,.92);backdrop-filter:blur(8px);z-index:100;padding:env(safe-area-inset-top) 22px calc(env(safe-area-inset-bottom) + 24px);flex-direction:column;justify-content:center;">
    <div style="text-align:center;margin-bottom:6px;color:var(--cyan);letter-spacing:3px;font-size:12px;font-weight:700;">J.A.R.V.I.S. CHECK-IN</div>
    <div id="logTitle" style="text-align:center;font-size:24px;font-weight:700;margin-bottom:24px;">Log Gym</div>
    <button class="btn btn-primary" data-status="done">✅ Did it</button>
    <button class="btn btn-ghost" data-status="partial" style="border-color:#5b4a1f;color:#ffd98a;">🟡 Partial</button>
    <button class="btn btn-ghost" data-status="skipped" style="border-color:#5b1f1f;color:#ffb0b0;">❌ Skipped</button>
    <button class="btn btn-ghost" id="logClose" style="margin-top:18px;opacity:.6;">Dismiss</button>
  </div>

<script>
/* ===== CONFIG (injected at build) ===== */
const VAPID_PUBLIC = "BJDnPKy5bxemFNASfGNRCprskjmhnon32m3ksEypcK7RzcT5_6g3mbSEu_Ad-7vQX891PbnSwCDI7Vjl_4icBak";
const SUB_TOPIC = "hermes-yaro-jarvis-pwa-sub-426e9ec3";          // ntfy topic the backend listens on for subscriptions
const STATE_TOPIC = "hermes-yaro-jarvis-state-85ec36fe";       // ntfy topic the backend publishes state to
const INBOUND_TOPIC = "hermes-yaro-jarvis-in-c4e3ac0f";        // gateway delivers messages here to Jarvis
const NTFY = "https://ntfy.sh";

/* ===== helpers ===== */
const $ = (id) => document.getElementById(id);
function toast(msg, isErr) {
  const t = $('toast'); t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 3200);
}
function urlB64ToUint8(base64) {
  const pad = '='.repeat((4 - base64.length % 4) % 4);
  const b = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b); const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

/* ===== greeting ===== */
(function () {
  const h = new Date().getHours();
  $('greeting').textContent = h < 12 ? 'Good morning, Yaro' : h < 18 ? 'Good afternoon, Yaro' : 'Good evening, Yaro';
})();

/* ===== state feed (ambient) ===== */
async function loadState() {
  try {
    const r = await fetch(`${NTFY}/${STATE_TOPIC}/json?poll=1`, { cache: 'no-store' });
    const text = await r.text();
    const lines = text.trim().split('\n').filter(Boolean);
    let latest = null;
    for (const ln of lines) {
      try { const o = JSON.parse(ln); if (o.event === 'message' && o.message) latest = o.message; } catch (e) {}
    }
    if (!latest) return;
    const s = JSON.parse(latest);
    if (s.headline) $('headline').textContent = s.headline;
    if (s.next) $('next').textContent = s.next;
    if (s.leaveby) $('leaveby').textContent = s.leaveby;
    if (s.focus) $('focus').textContent = s.focus;
    if (s.streak != null) $('streak').innerHTML = `${s.streak} <small>DAYS</small>`;
    $('dot').classList.add('live');
  } catch (e) { /* offline / empty is fine */ }
}
loadState();
setInterval(loadState, 60000);

/* ===== push subscription ===== */
async function registerSW() {
  if (!('serviceWorker' in navigator)) throw new Error('No service worker support');
  return navigator.serviceWorker.register('sw.js');
}

async function enablePush() {
  if (!isStandalone()) {
    toast('First: Share → Add to Home Screen, then open JARVIS from the icon.', true);
    return;
  }
  if (!('PushManager' in window)) { toast('Push not supported on this device.', true); return; }
  $('enableBtn').disabled = true; $('enableBtn').textContent = 'Enabling…';
  try {
    const reg = await registerSW();
    await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { toast('Permission denied.', true); resetBtn(); return; }
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(VAPID_PUBLIC)
      });
    }
    // Primary path: send subscription to backend via ntfy (no server/tunnel needed)
    const subJson = JSON.stringify(sub);
    let delivered = false;
    try {
      const resp = await fetch(`${NTFY}/${SUB_TOPIC}`, {
        method: 'POST',
        headers: { 'Title': 'jarvis-subscription', 'Tags': 'pushpin' },
        body: subJson
      });
      delivered = resp.ok;
    } catch (e) { delivered = false; }
    // Fallback path: always expose the sub so it can be delivered manually if ntfy is throttled
    $('subText').value = subJson;
    if (!delivered) {
      $('subText').style.display = 'block';
      $('copyBtn').style.display = 'block';
      toast('Subscribed. Tap "Copy subscription" and send it to Jarvis.', false);
    }
    localStorage.setItem('jarvisSub', '1');
    localStorage.setItem('jarvisSubJson', subJson);
    $('pushStatus').textContent = 'Push enabled. JARVIS can reach you.';
    $('enableBtn').textContent = 'Push Enabled ✓'; $('testBtn').style.display = 'block';
    $('dot').classList.add('live');
    toast('JARVIS is online.');
  } catch (e) {
    toast('Failed: ' + e.message, true); resetBtn();
  }
}
function resetBtn() { $('enableBtn').disabled = false; $('enableBtn').textContent = 'Enable JARVIS Push'; }

async function sendTest() {
  // Ask backend to fire a test push by posting to the sub topic with a flag
  await fetch(`${NTFY}/${SUB_TOPIC}`, {
    method: 'POST', headers: { 'Title': 'jarvis-test-request' }, body: 'TEST_PUSH'
  });
  toast('Requested — should land in a few seconds.');
}

$('enableBtn').addEventListener('click', enablePush);
$('testBtn').addEventListener('click', sendTest);
$('copyBtn').addEventListener('click', async () => {
  const v = $('subText').value || localStorage.getItem('jarvisSubJson') || '';
  try { await navigator.clipboard.writeText(v); toast('Copied. Paste it to Jarvis on Telegram.'); }
  catch (e) { $('subText').style.display = 'block'; $('subText').select(); toast('Select all & copy the text above.', true); }
});

if (localStorage.getItem('jarvisSub')) {
  registerSW();
  $('pushStatus').textContent = 'Push enabled. JARVIS can reach you.';
  $('enableBtn').textContent = 'Push Enabled ✓'; $('testBtn').style.display = 'block';
  // Auto-refresh: iOS rotates the subscription on SW updates. Re-send current one on open.
  (async () => {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        const j = JSON.stringify(sub);
        if (j !== localStorage.getItem('jarvisSubJson')) {
          localStorage.setItem('jarvisSubJson', j);
          fetch(`${NTFY}/${SUB_TOPIC}`, { method: 'POST', headers: { 'Title': 'jarvis-subscription' }, body: j }).catch(() => {});
        }
      }
    } catch (e) {}
  })();
}
if (!isStandalone()) {
  $('pushStatus').innerHTML = 'To enable push: tap <b>Share</b> → <b>Add to Home Screen</b>, then open JARVIS from the icon.';
}

/* ===== one-tap log sheet (opened from a check-in notification tap: ?log=Gym) ===== */
function showLogSheet(habit) {
  $('logTitle').textContent = 'Log ' + habit;
  const sheet = $('logSheet');
  sheet.style.display = 'flex';
  sheet.dataset.habit = habit;
}
async function logStatus(habit, status) {
  try {
    await fetch(`${NTFY}/${INBOUND_TOPIC}`, {
      method: 'POST', body: `Log ${habit}: ${status}`
    });
    toast(`Logged: ${habit} ${status} ✓`);
  } catch (e) {
    toast('Could not reach Jarvis — try again.', true);
  }
  setTimeout(() => { $('logSheet').style.display = 'none'; }, 900);
}
document.querySelectorAll('#logSheet [data-status]').forEach((b) => {
  b.addEventListener('click', () => {
    const habit = $('logSheet').dataset.habit || 'Gym';
    logStatus(habit, b.dataset.status);
  });
});
$('logClose').addEventListener('click', () => { $('logSheet').style.display = 'none'; });

(function checkLogParam() {
  const params = new URLSearchParams(location.search);
  const habit = params.get('log');
  if (habit) {
    showLogSheet(habit);
    // clean the URL so a refresh doesn't reopen the sheet
    history.replaceState({}, '', location.pathname);
  }
})();

// When the app is already open, the service worker posts a message on notification tap
navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'show-log' && e.data.habit) {
    showLogSheet(e.data.habit);
  }
});
</script>
</body>
</html>
