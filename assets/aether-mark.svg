<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A3D8F"/>
      <stop offset="45%" stop-color="#0A84D6"/>
      <stop offset="100%" stop-color="#21E6FF"/>
    </linearGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A3D8F"/>
      <stop offset="100%" stop-color="#0A6FC2"/>
    </linearGradient>
    <linearGradient id="gc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16B8E8"/>
      <stop offset="100%" stop-color="#5BF2FF"/>
    </linearGradient>
  </defs>

  <!-- transparent background; centered mark at 256,256 -->
  <g transform="translate(256,256)">

    <!-- ===== Interlocking loops (two crossing rounded-rect orbitals) ===== -->
    <g fill="none" stroke-linecap="round">
      <!-- back loop (dark blue), tilted -045 -->
      <rect x="-150" y="-58" width="300" height="116" rx="58"
            transform="rotate(-45)" stroke="url(#gd)" stroke-width="34"/>
      <!-- front loop (cyan), tilted +45 -->
      <rect x="-150" y="-58" width="300" height="116" rx="58"
            transform="rotate(45)" stroke="url(#gc)" stroke-width="34"/>
    </g>

    <!-- ===== Top crystal ===== -->
    <g transform="translate(0,-150)">
      <polygon points="0,-46 26,-14 0,4 -26,-14" fill="#6FE9FF"/>
      <polygon points="-26,-14 0,4 0,40 -16,30" fill="#0A3D8F"/>
      <polygon points="26,-14 0,4 0,40 16,30" fill="#1AA6E6"/>
    </g>
    <!-- ===== Bottom crystal (mirrored) ===== -->
    <g transform="translate(0,150) scale(1,-1)">
      <polygon points="0,-46 26,-14 0,4 -26,-14" fill="#6FE9FF"/>
      <polygon points="-26,-14 0,4 0,40 -16,30" fill="#1AA6E6"/>
      <polygon points="26,-14 0,4 0,40 16,30" fill="#0A3D8F"/>
    </g>

    <!-- ===== Central eye ===== -->
    <circle cx="0" cy="0" r="46" fill="#F8FAFC"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="url(#g)" stroke-width="8"/>
    <circle cx="0" cy="0" r="17" fill="#0A2E6B"/>
  </g>
</svg>
